---
- name: Configure EC2 and deploy app
  hosts: webserver
  become: yes

  vars:
    ecr_url: "{{ lookup('env', 'AWS_ACCOUNT_ID') }}.dkr.ecr.ap-southeast-1.amazonaws.com"

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - awscli
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Datadog agent
      include_role:
        name: datadog.dd.agent
      vars:
        datadog_api_key: "{{ lookup('env', 'DD_API_KEY') }}"
        datadog_site: "datadoghq.com"
        datadog_agent_major_version: 7
        datadog_config:
          tags:
            - "env:dev"
            - "project:thales-prep"
            - "owner:wmjay"
        datadog_checks:
          docker:
            init_config:
            instances: [{}]

    - name: Add dd-agent user to docker group
      user:
        name: dd-agent
        groups: docker
        append: yes

    - name: Restart Datadog agent
      service:
        name: datadog-agent
        state: restarted

    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin {{ ecr_url }}
      environment:
        AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
        AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
        AWS_DEFAULT_REGION: "ap-southeast-1"

    - name: Pull Docker image from ECR
      command: docker pull {{ ecr_url }}/thales-app:latest
      environment:
        AWS_ACCESS_KEY_ID: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
        AWS_SECRET_ACCESS_KEY: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"

    - name: Remove existing container if exists
      command: docker rm -f thales-app
      ignore_errors: yes

    - name: Run Docker container
      command: docker run -d -p 8080:8080 --name thales-app {{ ecr_url }}/thales-app:latest

    - name: Install nginx and openssl
      apt:
        name:
          - nginx
          - openssl
        state: present

    - name: Create self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /etc/ssl/private/thales-prep.key
        -out /etc/ssl/certs/thales-prep.crt
        -subj "/C=SG/ST=Singapore/L=Singapore/O=thales-prep/CN=thales-prep"
      args:
        creates: /etc/ssl/certs/thales-prep.crt

    - name: Configure nginx as reverse proxy
      copy:
        dest: /etc/nginx/sites-available/thales-app
        content: |
          server {
              listen 80;
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl;
              ssl_certificate /etc/ssl/certs/thales-prep.crt;
              ssl_certificate_key /etc/ssl/private/thales-prep.key;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/thales-app
        dest: /etc/nginx/sites-enabled/thales-app
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes