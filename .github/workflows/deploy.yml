name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build -t thales-app ./app/

      - name: Tag and push to ECR
        run: |
          docker tag thales-app:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/thales-app:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/thales-app:latest

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/thales-app:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Install Datadog Ansible collection
        run: ansible-galaxy collection install datadog.dd
        
      - name: Deploy via Ansible
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          pip install ansible
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cd ansible
          sed -i "s/[0-9]\+\.[0-9]\+\.[0-9]\+\.[0-9]\+/$EC2_HOST/" inventory.ini
          ansible-playbook -i inventory.ini playbook.yml \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            -e "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" \
            -e "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" \
            -e "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" \
            -e "DD_API_KEY=$DD_API_KEY"
          rm -f /tmp/deploy_key  